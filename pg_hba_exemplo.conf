# PostgreSQL Client Authentication Configuration File
# ===================================================
#
# Adicione estas linhas no arquivo pg_hba.conf do servidor PostgreSQL
# Localização:
# - Linux: /etc/postgresql/14/main/pg_hba.conf
# - Windows: C:\Program Files\PostgreSQL\14\data\pg_hba.conf

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Conexões locais (já existem)
local   all             all                                     peer
host    all             all             127.0.0.1/32            md5
host    all             all             ::1/128                 md5

# ===== ADICIONE ESTAS LINHAS =====

# Permitir conexões da rede local 192.168.25.x
host    all             all             192.168.25.0/24         md5

# Ou permitir apenas o banco gestao_ti
host    gestao_ti       postgres        192.168.25.0/24         md5

# Ou permitir de qualquer IP (MENOS SEGURO - apenas para desenvolvimento)
# host    all             all             0.0.0.0/0               md5

# ==================================

# Após editar:
# 1. Salve o arquivo
# 2. Reinicie o PostgreSQL:
#    Linux: sudo systemctl restart postgresql
#    Windows: Reinicie o serviço postgresql-x64-14
